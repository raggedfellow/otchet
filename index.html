<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневной отчёт монтажника</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { max-width: 1000px; margin: 20px auto; padding: 0 15px; background: #f0f2f5; }

        .extra-work-select-row .form-group { flex: 1 1 100px; min-width: 80px; }
        .extra-work-select-row .form-group.col-work { flex: 1.2; min-width: 100px; }

        .extra-work-select-row .form-group.col-rooms { flex: 1.2; min-width: 100px; }
        .extra-work-select-row .form-group.col-actions { flex: 0 0 40px; min-width: 40px; }
        .extra-work-select-row .form-group label { font-size: 11px; font-weight: 600; color: #555; margin-bottom: 2px; display: block; }

        .extra-work-select-row .form-group select option { color: #333; font-style: normal; }
        .select-placeholder { color: #aaa; font-style: italic; }
        .table-qty-input { width: 60px; padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; text-align: center; }
        .table-qty-input:focus { border-color: #0066cc; outline: none; }
        .save-qty-btn { background: #28a745; color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 11px; margin-left: 4px; }
        .save-qty-btn:hover { background: #1e7e34; }

        .room-list-hint { font-size: 10px; color: #888; margin-top: 2px; padding-left: 2px; }
        .system-indicator { display: inline-block; padding: 2px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .system-indicator.aps { background: #f8d7da; color: #721c24; }
        .system-indicator.soue { background: #cce5ff; color: #004085; }
        .bottom-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        @media (max-width: 600px) { .form-group { flex: 1 1 100%; } .preset-row .form-group { flex: 1 1 100%; } .extra-work-row .form-group { flex: 1 1 100%; } .extra-work-select-row .form-group { flex: 1 1 100%; } .btn { width: 100%; text-align: center; } }
    </style>
</head>
<body>

    <!-- Модальное окно для подтверждения -->
    <div class="modal-overlay confirm-modal" id="confirmModal">
        <div class="modal-box">
            <h3>✅ Проверьте данные</h3>
            <div class="confirm-details" id="confirmDetails"></div>
            <div class="warning-text" id="confirmWarning"></div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="confirmCancelBtn">✏️ Редактировать</button>
                <button class="btn btn-confirm" id="confirmOkBtn">✅ Всё верно</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="warningModal">
        <div class="modal-box">
            <h3>⚠️ Возможная ошибка</h3>
            <p id="warningMessage"></p>
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="modalCancelBtn">Отмена</button>
                <button class="btn btn-warning" id="modalConfirmBtn">✅ Всё верно</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>📝 Добавить запись о работе</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Дата</label>
                <input id="workDate" type="date">
            </div>
            <div class="form-group">
                <label>ФИО</label>
                <input id="fio" type="text" placeholder="Иванов И.И.">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Этаж</label>
                <select id="floor">
                    <option value="подвал">Подвал</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="чердак">Чердак</option>
                </select>
            </div>
            <div class="form-group">
                <label>№ помещения</label>
                <input id="room" type="number" placeholder="5" min="1" step="1">
            </div>
            <div class="form-group">
                <label>Тип работ</label>
                <select id="workType">
                    <option value="Монтаж">🔧 Монтаж</option>
                    <option value="Демонтаж">🔨 Демонтаж</option>
                </select>
            </div>
            <div class="form-group">
                <label>Система</label>
                <select id="system">
                    <option value="АПС">АПС</option>
                    <option value="СОУЭ">СОУЭ</option>
                </select>
            </div>
        </div>
        <div id="presetBlock"></div>
        <div id="extraWorkBlock"></div>
        <div class="action-buttons">
            <button class="btn btn-confirm" id="addToJournalBtn">✅ Добавить в журнал</button>
        </div>
        <div class="quick-add-hint" id="quickAddHint" style="display: none;">
            <span>⚡ Последнее: <strong id="lastLocationDisplay">—</strong></span>
            <button class="btn btn-outline" style="padding: 4px 12px; font-size: 12px;" id="useLastLocationBtn">Использовать</button>
        </div>
    </div>

    <div class="card">
        <h2>📋 Журнал (<span id="rowCount">0</span>)</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th><th>Дата</th><th>ФИО</th><th>Этаж</th><th>Пом.</th>
                        <th>Тип</th><th>Система</th><th>Материал</th><th>Ед.</th>
                        <th>Кол-во</th><th style="width:40px;"></th>
                    </tr>
                </thead>
                <tbody id="entriesBody">
                    <tr><td colspan="11" style="text-align:center; color:#aaa;">Нет записей</td></tr>
                </tbody>
            </table>
        </div>
        <div class="bottom-buttons">
            <button class="btn btn-danger" id="clearBtn">🗑 Очистить</button>
            <button class="btn btn-send" id="sendBtn">📤 Отправить</button>
            <button class="btn btn-csv" id="csvBtn">📥 CSV</button>
        </div>
        <div id="statusBar" class="status-bar"></div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbw9unHgYnRaaAhaaKU_f8kJoGTwv9Tt0ku30gtnNKHGIipWLjU06v3N0LH9KaSUe7SJ/exec';
        const PRESET_MATERIALS = {
            'АПС': {
                cable: { label: 'Кабель АПС', default: 'Кабель КПСнг(А)-FRHF 1×2×0,75', unit: 'м' },
                cableChannel: {
                    label: 'Кабель-канал',
                    options: [{ name: 'Кабель-канал белый ECOLINE 16x25 IEK', label: '16×25', unit: 'м' }, { name: 'Кабель-канал белый ECOLINE 40x25 IEK', label: '40×25', unit: 'м' }],
                    default: 'Кабель-канал белый ECOLINE 16x25 IEK'
                },
                corrugation: {
                    label: 'Гофра',
                    options: [{ name: 'Труба гофрированная ПВХ, d=16 мм, серая', label: 'd16', unit: 'м' }, { name: 'Труба гофрированная ПВХ, d=20 мм, серая', label: 'd20', unit: 'м' }],
                    default: 'Труба гофрированная ПВХ, d=16 мм, серая'
                },
                extra: [{ name: 'Труба электросварная ГОСТ 10705-80 16×1,5 мм', label: 'Труба э/с 16', unit: 'м' }, { name: 'Труба электросварная ГОСТ 10705-80 20×1,5 мм', label: 'Труба э/с 20', unit: 'м' }, { name: 'Кабель питания 12В', label: 'Кабель питания 12В', unit: 'м' }]
            },
            'СОУЭ': {
                cable: { label: 'Кабель СОУЭ', default: 'Кабель КПСнг(А)-FRHF 1×2×1,0', unit: 'м' },
                cableChannel: {
                    label: 'Кабель-канал',
                    options: [{ name: 'Кабель-канал белый ECOLINE 16x25 IEK', label: '16×25', unit: 'м' }, { name: 'Кабель-канал белый ECOLINE 40x25 IEK', label: '40×25', unit: 'м' }],
                    default: 'Кабель-канал белый ECOLINE 16x25 IEK'
                },
                corrugation: {
                    label: 'Гофра',
                    options: [{ name: 'Труба гофрированная ПВХ, d=16 мм, серая', label: 'd16', unit: 'м' }, { name: 'Труба гофрированная ПВХ, d=20 мм, серая', label: 'd20', unit: 'м' }],
                    default: 'Труба гофрированная ПВХ, d=16 мм, серая'
                },
                extra: [{ name: 'Труба электросварная ГОСТ 10705-80 16×1,5 мм', label: 'Труба э/с 16', unit: 'м' }, { name: 'Труба электросварная ГОСТ 10705-80 20×1,5 мм', label: 'Труба э/с 20', unit: 'м' }, { name: 'Кабель питания 12В', label: 'Кабель питания 12В', unit: 'м' }]
            }
        };
        const EXTRA_WORK_OPTIONS = [{ name: 'Минеральная вата 100 мм, 100 кг/м³', label: 'Вата', unit: 'шт' }, { name: 'Бирки кабельные треугольник, 55×60 мм', label: 'Бирки', unit: 'шт' }];

        let entries = [], pendingEntry = null, extraMaterials = [], extraWorks = [];
        let savedPresetValues = { cableQty: '', cableChannel: '', cableChannelQty: '', corrugation: '', corrugationQty: '' };

        function formatNumber(num) { return Number.isInteger(num) ? num.toString() : num.toFixed(1); }
        function parseQty(v) { let c = v.replace(',', '.').replace(/[^0-9.]/g, ''); let p = c.split('.'); return p.length > 2 ? parseFloat(p[0] + '.' + p.slice(1).join('')) : parseFloat(c); }

        const dateInput = document.getElementById('workDate'), fioInput = document.getElementById('fio'), floorSelect = document.getElementById('floor'), roomInput = document.getElementById('room'), workTypeSelect = document.getElementById('workType'), systemSelect = document.getElementById('system'), presetBlock = document.getElementById('presetBlock'), extraWorkBlock = document.getElementById('extraWorkBlock'), addToJournalBtn = document.getElementById('addToJournalBtn'), entriesBody = document.getElementById('entriesBody'), rowCount = document.getElementById('rowCount'), clearBtn = document.getElementById('clearBtn'), sendBtn = document.getElementById('sendBtn'), csvBtn = document.getElementById('csvBtn'), statusBar = document.getElementById('statusBar'), quickAddHint = document.getElementById('quickAddHint'), lastLocationDisplay = document.getElementById('lastLocationDisplay'), useLastLocationBtn = document.getElementById('useLastLocationBtn'), warningModal = document.getElementById('warningModal'), warningMessage = document.getElementById('warningMessage'), modalConfirmBtn = document.getElementById('modalConfirmBtn'), modalCancelBtn = document.getElementById('modalCancelBtn'), confirmModal = document.getElementById('confirmModal'), confirmDetails = document.getElementById('confirmDetails'), confirmWarning = document.getElementById('confirmWarning'), confirmOkBtn = document.getElementById('confirmOkBtn'), confirmCancelBtn = document.getElementById('confirmCancelBtn');

        function setTodayDate() { const t = new Date(); dateInput.value = t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0'); } setTodayDate();

        function normalizeRoomsList(input) { if (!input || !input.trim()) return ''; let parts = input.replace(/,/g,' ').trim().split(/\s+/).map(p=>parseInt(p)).filter(n=>!isNaN(n)&&n>0); return [...new Set(parts)].join(', '); }

        function checkCableCompatibility(sys, mat) { if (!mat.includes('Кабель КПСнг')) return null; let isAPS = mat.includes('1×2×0,75'), isSOUE = mat.includes('1×2×1,0'); if (sys==='АПС' && isSOUE) return { wrong: true, message: '⚠️ Для АПС используется кабель 1×2×0,75. Продолжить?' }; if (sys==='СОУЭ' && isAPS) return { wrong: true, message: '⚠️ Для СОУЭ используется кабель 1×2×1,0. Продолжить?' }; return null; }

        function checkPowerCable(sys, mat) { if (mat==='Кабель питания 12В' && sys==='АПС') return { wrong: true, message: '⚠️ Кабель питания 12В для СОУЭ. Продолжить?' }; return null; }

        function showWarning(msg, data) { warningMessage.textContent = msg; pendingEntry = data; warningModal.classList.add('active'); }
        function hideWarning() { warningModal.classList.remove('active'); pendingEntry = null; }
        modalConfirmBtn.addEventListener('click', function(){ hideWarning(); performAddToJournal(); });
        modalCancelBtn.addEventListener('click', hideWarning);
        warningModal.addEventListener('click', function(e){ if (e.target===this) hideWarning(); });

        function showConfirmModal(data) {
            let list = data.materials.map((item,i)=>`${i+1}. ${item.material} — ${formatNumber(item.qty)} ${item.unit} (пом. ${item.room})`).join('<br>');
            let floorDisplay = data.floor==='подвал'?'Подвал':(data.floor==='чердак'?'Чердак':data.floor);
            confirmDetails.innerHTML = `<strong>📅 Дата:</strong> ${data.date}<br><strong>👤 ФИО:</strong> ${data.fio}<br><strong>🏗️ Этаж:</strong> ${floorDisplay}<br><strong>🏠 Помещение:</strong> ${data.room}<br><strong>🔧 Тип:</strong> ${data.workType}<br><strong>📡 Система:</strong> ${data.system}<br><strong>📦 Материалы:</strong><br>${list}`;
            let today = new Date().toISOString().slice(0,10);
            confirmWarning.textContent = (data.date!==today) ? '⚠️ Дата не сегодня!' : (data.fio.length<2 ? '⚠️ ФИО короткое!' : '');
            confirmWarning.style.display = confirmWarning.textContent ? 'block' : 'none';
            confirmModal.classList.add('active');
        }
        function hideConfirmModal() { confirmModal.classList.remove('active'); }
        confirmCancelBtn.addEventListener('click', hideConfirmModal);
        confirmOkBtn.addEventListener('click', function(){ hideConfirmModal(); performAddToJournal(); });
        confirmModal.addEventListener('click', function(e){ if (e.target===this) hideConfirmModal(); });

        function performAddToJournal() {
            const date = dateInput.value, fio = fioInput.value.trim()||'Не указано', floor = floorSelect.value, room = roomInput.value.trim(), workType = workTypeSelect.value, system = systemSelect.value;
            if (!date) { alert('Дата'); return; } if (!room) { alert('Помещение'); return; } if (isNaN(parseInt(room)) || parseInt(room)<=0) { alert('Некорректный номер'); return; }
            let toAdd = [];
            let cableQty = parseQty(document.querySelector('.preset-cable-qty')?.value||''), cableName = document.querySelector('.preset-cable')?.value||'';
            if (cableName && cableQty>0) { let chk = checkCableCompatibility(system, cableName); if (chk) { showWarning(chk.message, null); return; } toAdd.push({ material: cableName, unit: 'м', qty: cableQty, room, workType, system }); }
            let chQty = parseQty(document.querySelector('.preset-channel-qty')?.value||''), chName = document.querySelector('.preset-cable-channel')?.value||'';
            if (chName && chQty>0) toAdd.push({ material: chName, unit: 'м', qty: chQty, room, workType, system });
            let corrQty = parseQty(document.querySelector('.preset-corrugation-qty')?.value||''), corrName = document.querySelector('.preset-corrugation')?.value||'';
            if (corrName && corrQty>0) toAdd.push({ material: corrName, unit: 'м', qty: corrQty, room, workType, system });
            document.querySelectorAll('.preset-extra-select').forEach((sel, idx) => {
                if (idx < extraMaterials.length) {
                    let q = parseQty(document.querySelectorAll('.preset-extra-qty')[idx]?.value||'');
                    if (sel.value && q>0) {
                        let unit = PRESET_MATERIALS[system]?.extra.find(e=>e.name===sel.value)?.unit||'м';
                        if (sel.value==='Кабель питания 12В') { let chk2 = checkPowerCable(system, sel.value); if (chk2) { showWarning(chk2.message, null); return; } }
                        toAdd.push({ material: sel.value, unit, qty: q, room, workType, system });
                    }
                }
            });
            let allExtraRooms = [], dupErr = false;
            for (let w of extraWorks) {
                let q = parseQty(w.qty||''), rooms = normalizeRoomsList(w.rooms||'');
                if (w.name && q>0 && rooms) {
                    let parts = rooms.split(',').map(s=>s.trim()).filter(s=>s);
                    for (let p of parts) { if (allExtraRooms.includes(p)) { alert('⚠️ Помещение '+p+' уже использовано'); dupErr=true; break; } allExtraRooms.push(p); }
                    if (dupErr) break;
                    toAdd.push({ material: w.name, unit: 'шт', qty: q, room: rooms, workType, system: 'АПС/СОУЭ' });
                } else if (w.name && q>0 && !rooms) { alert('❌ Для '+w.name+' не указаны помещения'); dupErr=true; break; }
            }
            if (dupErr) return;
            if (!toAdd.length) { alert('Нет материалов'); return; }
            let added=0, merged=0;
            for (let item of toAdd) {
                let idx = entries.findIndex(e=>e.date===date&&e.fio===fio&&e.floor===floor&&e.room===item.room&&e.workType===item.workType&&e.system===item.system&&e.material===item.material);
                if (idx!==-1) { entries[idx].qty += item.qty; merged++; } else { entries.push({ date, fio, floor, room:item.room, workType:item.workType, system:item.system, material:item.material, unit:item.unit, qty:item.qty }); added++; }
            }
            document.querySelectorAll('.preset-qty').forEach(inp=>inp.value='');
            extraMaterials = []; extraWorks = [];
            savedPresetValues = { cableQty:'', cableChannel:'', cableChannelQty:'', corrugation:'', corrugationQty:'' };
            renderPresetBlock(); renderExtraWorkBlock(); render();
            alert('✅ Добавлено '+added+' новых, '+merged+' суммировано');
        }

        function render() {
            if (!entries.length) { entriesBody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:#aaa;">Нет записей</td></tr>'; rowCount.textContent='0'; quickAddHint.style.display='none'; return; }
            let html = '';
            entries.forEach((e, idx) => {
                let floorD = e.floor==='подвал'?'Подвал':(e.floor==='чердак'?'Чердак':e.floor);
                let badge = e.system==='АПС'?'badge-aps':(e.system==='СОУЭ'?'badge-soue':(e.system==='АПС/СОУЭ'?'badge-both':'badge'));
                let wtClass = e.workType==='Монтаж'?'montazh':'demontazh';
                html += `<tr><td>${idx+1}</td><td>${e.date}</td><td>${e.fio}</td><td><span class="badge-room">${floorD}</span></td><td>${e.room}</td><td><span class="badge badge-worktype ${wtClass}">${e.workType}</span></td><td><span class="badge ${badge}">${e.system}</span></td><td style="font-size:11px;">${e.material}</td><td>${e.unit}</td><td><input type="text" class="table-qty-input" value="${formatNumber(e.qty)}" data-index="${idx}"><button class="save-qty-btn" data-index="${idx}">💾</button></td><td><button class="delete-btn" data-index="${idx}">✕</button></td></tr>`;
            });
            entriesBody.innerHTML = html;
            rowCount.textContent = entries.length;
            document.querySelectorAll('.save-qty-btn').forEach(b=>b.addEventListener('click', function(){ let idx=parseInt(this.dataset.index); let inp=document.querySelector(`.table-qty-input[data-index="${idx}"]`); if(inp) updateEntryQty(idx, inp.value); }));
            document.querySelectorAll('.table-qty-input').forEach(inp=>inp.addEventListener('keydown', function(e){ if(e.key==='Enter'){ let idx=parseInt(this.dataset.index); updateEntryQty(idx, this.value); } }));
            document.querySelectorAll('.delete-btn').forEach(b=>b.addEventListener('click', function(){ let idx=parseInt(this.dataset.index); if(confirm('Удалить?')){ entries.splice(idx,1); render(); updateQuickAddHint(); } }));
            updateQuickAddHint();
        }

        function updateEntryQty(idx, val) { let q = parseQty(val); if (!isNaN(q) && q>0) { entries[idx].qty = q; render(); } else if (val!=='') alert('Введите число > 0'); }

        function updateQuickAddHint() {
            if (entries.length) { let last = entries[entries.length-1]; let fd = last.floor==='подвал'?'Подвал':(last.floor==='чердак'?'Чердак':last.floor); lastLocationDisplay.textContent = fd+', пом. '+last.room; quickAddHint.style.display='flex'; } else quickAddHint.style.display='none';
        }

        useLastLocationBtn.addEventListener('click', function() {
            if (!entries.length) return; let last = entries[entries.length-1];
            floorSelect.value = last.floor; roomInput.value = last.room; workTypeSelect.value = last.workType||'Монтаж'; systemSelect.value = last.system==='АПС/СОУЭ'?'АПС':last.system;
            extraMaterials = []; extraWorks = []; savedPresetValues = { cableQty:'', cableChannel:'', cableChannelQty:'', corrugation:'', corrugationQty:'' };
            renderPresetBlock(); renderExtraWorkBlock(); quickAddHint.style.display='none';
        });

        function exportCSV() {
            if (!entries.length) { alert('Нет данных'); return; }
            let csv = '\uFEFF'; csv += 'Дата;ФИО;Этаж;Помещение;Тип;Система;Материал;Ед.;Кол-во\n';
            entries.forEach(e => { let fd = e.floor==='подвал'?'Подвал':(e.floor==='чердак'?'Чердак':e.floor); csv += `${e.date};${e.fio};${fd};${e.room};${e.workType};${e.system};${e.material};${e.unit};${formatNumber(e.qty)}\n`; });
            let blob = new Blob([csv], {type:'text/csv;charset=utf-8;'}); let link = document.createElement('a'); let url = URL.createObjectURL(blob); link.href = url; link.download = 'отчёт_'+dateInput.value+'.csv'; document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url); alert('✅ CSV скачан');
        }

        async function sendReport() {
            if (!entries.length) { statusBar.className='status-bar error'; statusBar.textContent='❌ Нет данных'; statusBar.style.display='block'; setTimeout(()=>{statusBar.style.display='none';},3000); return; }
            if (!confirm('📤 Отправить '+entries.length+' записей?')) return;
            statusBar.className='status-bar sending'; statusBar.textContent='⏳ Отправка...'; statusBar.style.display='block';
            let reports = entries.map(e=>({ date:e.date, fio:e.fio, floor:e.floor, room:e.room, workType:e.workType||'Монтаж', system:e.system, material:e.material, unit:e.unit||'', qty:e.qty }));
            let success=0, fail=0;
            for (let i=0; i<reports.length; i++) {
                try { await fetch(WEBHOOK_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(reports[i]) }); success++; statusBar.textContent='⏳ Отправка... ('+(i+1)+'/'+entries.length+')'; } catch(e) { fail++; }
            }
            if (!fail) { statusBar.className='status-bar success'; statusBar.textContent='✅ Отправлено: '+success+' записей'; statusBar.style.display='block'; setTimeout(()=>{statusBar.style.display='none';},5000); if(confirm('Очистить?')){ entries=[]; render(); } } else { statusBar.className='status-bar error'; statusBar.textContent='⚠️ Ошибок: '+fail; statusBar.style.display='block'; }
        }

        function clearAll() { if (!entries.length) return; if (confirm('Удалить всё?')) { entries=[]; render(); statusBar.style.display='none'; } }

        function createPresetRow(label, type, props, unit, qtyClass, qtyVal) {
            let row = document.createElement('div'); row.className = 'preset-row';
            let mg = document.createElement('div'); mg.className = 'form-group col-material'; let ml = document.createElement('label'); ml.textContent = label; mg.appendChild(ml);
            let inp = document.createElement(type==='select'?'select':'input');
            for (let [k,v] of Object.entries(props)) { if (k==='innerHTML') inp.innerHTML = v; else inp[k] = v; }
            if (type==='input') inp.className = props.className||'';
            mg.appendChild(inp); row.appendChild(mg);
            let qg = document.createElement('div'); qg.className = 'form-group col-qty'; let ql = document.createElement('label'); ql.textContent = unit ? 'Кол-во ('+unit+')' : ''; qg.appendChild(ql);
            if (qtyClass) { let qi = document.createElement('input'); qi.type='text'; qi.className='preset-qty '+qtyClass; qi.inputMode='decimal'; qi.placeholder='0'; qi.value=qtyVal||''; qg.appendChild(qi); } else { let d = document.createElement('div'); d.className='h-34'; qg.appendChild(d); }
            row.appendChild(qg);
            let ag = document.createElement('div'); ag.className = 'form-group col-actions'; let al = document.createElement('label'); al.innerHTML='&nbsp;'; ag.appendChild(al); let ad = document.createElement('div'); ad.className='h-34'; ag.appendChild(ad); row.appendChild(ag);
            return row;
        }

        function renderPresetBlock() {
            let system = systemSelect.value, container = presetBlock; container.innerHTML = '';
            if (!system) { let msg = document.createElement('div'); msg.style.cssText='padding:15px;text-align:center;color:#888;background:#f8f9fa;border-radius:8px;'; msg.textContent='Выберите систему'; container.appendChild(msg); return; }
            let data = PRESET_MATERIALS[system]; if (!data) return;
            let sysClass = system==='АПС'?'aps':'soue'; let block = document.createElement('div'); block.className='preset-block';
            let title = document.createElement('div'); title.className='preset-title'; title.innerHTML='📋 Основные материалы <span class="system-indicator '+sysClass+'">'+system+'</span>'; block.appendChild(title);
            let cableRow = createPresetRow(data.cable.label, 'input', {type:'text', value:data.cable.default, readonly:true, className:'preset-cable'}, 'м', 'preset-cable-qty', savedPresetValues.cableQty||''); block.appendChild(cableRow);
            let chOpts = data.cableChannel.options.map(o=>`<option value="${o.name}" ${o.name===(savedPresetValues.cableChannel||data.cableChannel.default)?'selected':''}>${o.label}</option>`).join('');
            let chRow = createPresetRow(data.cableChannel.label, 'select', {className:'preset-cable-channel', innerHTML:chOpts}, 'м', 'preset-channel-qty', savedPresetValues.cableChannelQty||''); block.appendChild(chRow);
            let corrOpts = data.corrugation.options.map(o=>`<option value="${o.name}" ${o.name===(savedPresetValues.corrugation||data.corrugation.default)?'selected':''}>${o.label}</option>`).join('');
            let corrRow = createPresetRow(data.corrugation.label, 'select', {className:'preset-corrugation', innerHTML:corrOpts}, 'м', 'preset-corrugation-qty', savedPresetValues.corrugationQty||''); block.appendChild(corrRow);

            let presetChannel = document.querySelector('.preset-cable-channel'); let selChannel = presetChannel ? presetChannel.value : data.cableChannel.default;
            let allOpts = []; data.extra.forEach(o=>allOpts.push({name:o.name, label:o.label, unit:o.unit||'м', type:'extra'}));
            data.cableChannel.options.forEach(o=>{ if(o.name!==selChannel) allOpts.push({name:o.name, label:o.label, unit:'м', type:'channel'}); });
            allOpts.sort((a,b)=>a.label.localeCompare(b.label));
            let used = extraMaterials.map(m=>m.name), avail = allOpts.filter(o=>!used.includes(o.name));

            extraMaterials.forEach((mat, idx) => {
                let info = allOpts.find(o=>o.name===mat.name); if (!info) return;
                let opts = allOpts.map(o=>`<option value="${o.name}" ${o.name===mat.name?'selected':''}>${o.label}</option>`).join('');
                let row = createPresetRow('Доп. материал', 'select', {className:'preset-extra-select', innerHTML:opts, 'data-extra':idx}, info.unit, 'preset-extra-qty', mat.qty||'');
                let btn = document.createElement('button'); btn.className='btn-remove-material'; btn.dataset.extra=idx; btn.textContent='✕';
                btn.addEventListener('click', function(){ let i=parseInt(this.dataset.extra); if(i>=0&&i<extraMaterials.length){ extraMaterials.splice(i,1); renderPresetBlock(); renderExtraWorkBlock(); } });
                let actCell = row.querySelector('.col-actions'); actCell.innerHTML = ''; actCell.appendChild(btn); block.appendChild(row);
            });

            if (avail.length) {
                let opts = avail.map(o=>`<option value="${o.name}">${o.label}</option>`).join('');
                let addRow = createPresetRow('➕ Добавьте ещё материал', 'select', {id:'extraMaterialSelect', className:'select-placeholder', innerHTML:`<option value="" selected disabled style="color:#aaa;">➕ Добавьте ещё материал</option>${opts}`}, '', '', '');
                let qCell = addRow.querySelector('.col-qty'); if(qCell) qCell.innerHTML='<div class="h-34"></div>';
                let aCell = addRow.querySelector('.col-actions'); if(aCell) aCell.innerHTML='<div class="h-34"></div>';
                block.appendChild(addRow);
            }
            container.appendChild(block);

            document.querySelectorAll('.preset-qty').forEach(inp=>inp.addEventListener('input', savePresetValues));
            document.querySelectorAll('.preset-cable-channel, .preset-corrugation').forEach(sel=>sel.addEventListener('change', function(){ savePresetValues(); renderPresetBlock(); renderExtraWorkBlock(); }));

            let extraSel = document.getElementById('extraMaterialSelect');
            if (extraSel) {
                extraSel.addEventListener('change', function() {
                    if (this.value) {
                        let sys = systemSelect.value, data = PRESET_MATERIALS[sys]; if (!data) return;
                        if (extraMaterials.some(m=>m.name===this.value)) { alert('⚠️ Уже добавлен'); this.value=''; return; }
                        let unit = 'м'; let info = allOpts.find(o=>o.name===this.value); if (info) unit = info.unit||'м';
                        extraMaterials.push({name:this.value, qty:'', unit:unit}); this.value='';
                        renderPresetBlock(); renderExtraWorkBlock();
                    }
                });
            }
            document.querySelectorAll('.preset-extra-select').forEach((sel, idx)=>{
                sel.addEventListener('change', function() {
                    if (idx < extraMaterials.length) {
                        let old = extraMaterials[idx].name, neu = this.value;
                        if (extraMaterials.some((m,i)=>i!==idx && m.name===neu)) { alert('⚠️ Уже добавлен'); this.value=old; return; }
                        extraMaterials[idx].name = neu; renderPresetBlock(); renderExtraWorkBlock();
                    }
                });
            });
            document.querySelectorAll('.preset-extra-qty').forEach((inp, idx)=>{ inp.addEventListener('input', function(){ if(idx<extraMaterials.length) extraMaterials[idx].qty = this.value; }); });
            savePresetValues();
        }

        function renderExtraWorkBlock() {
            let system = systemSelect.value, container = extraWorkBlock; container.innerHTML = '';
            if (!system) return;
            let block = document.createElement('div'); block.className='extra-work-block';
            let title = document.createElement('div'); title.className='extra-title'; title.textContent='📌 Дополнительные работы'; block.appendChild(title);

            extraWorks.forEach((work, idx) => {
                let row = document.createElement('div'); row.className='extra-work-row'; row.dataset.extraWork=idx;
                let wg = document.createElement('div'); wg.className='form-group col-work'; let wl = document.createElement('label'); wl.textContent='Работа'; wg.appendChild(wl);
                let wi = document.createElement('input'); wi.type='text'; wi.className='extra-work-name'; wi.value=work.label; wi.readOnly=true; wi.style.cssText='background:#f0f0f0;cursor:default;'; wg.appendChild(wi); row.appendChild(wg);
                let qg = document.createElement('div'); qg.className='form-group col-qty'; let ql = document.createElement('label'); ql.textContent='Кол-во (шт)'; qg.appendChild(ql);
                let qi = document.createElement('input'); qi.type='text'; qi.className='extra-work-qty'; qi.inputMode='decimal'; qi.placeholder='0'; qi.value=work.qty||''; qi.addEventListener('input', function(){ if(idx<extraWorks.length) extraWorks[idx].qty=this.value; }); qg.appendChild(qi); row.appendChild(qg);
                let rg = document.createElement('div'); rg.className='form-group col-rooms'; let rl = document.createElement('label'); rl.textContent='Список помещений'; rg.appendChild(rl);
                let ri = document.createElement('input'); ri.type='text'; ri.className='extra-work-rooms'; ri.placeholder='1, 2, 3, 5, 8'; ri.value=work.rooms||''; ri.addEventListener('input', function(){ if(idx<extraWorks.length) extraWorks[idx].rooms=this.value; }); rg.appendChild(ri); row.appendChild(rg);
                let ag = document.createElement('div'); ag.className='form-group col-actions'; let al = document.createElement('label'); al.innerHTML='&nbsp;'; ag.appendChild(al);
                let db = document.createElement('button'); db.className='btn-remove-extra'; db.dataset.extraWork=idx; db.textContent='✕'; db.addEventListener('click', function(){ let i=parseInt(this.dataset.extraWork); if(i>=0&&i<extraWorks.length){ extraWorks.splice(i,1); renderExtraWorkBlock(); } }); ag.appendChild(db); row.appendChild(ag);
                block.appendChild(row);
                let hint = document.createElement('div'); hint.className='room-list-hint'; hint.textContent='Номера через запятую, пробел или смешанно'; block.appendChild(hint);
            });

            let used = extraWorks.map(w=>w.name), avail = EXTRA_WORK_OPTIONS.filter(o=>!used.includes(o.name));
            let selRow = document.createElement('div'); selRow.className='extra-work-select-row'; selRow.id='extraWorkSelectRow';
            let sg = document.createElement('div'); sg.className='form-group col-work'; let sl = document.createElement('label'); sl.textContent='➕ Выберите доп работы'; sg.appendChild(sl);
            let sel = document.createElement('select'); sel.id='extraWorkSelect'; sel.className='select-placeholder';
            let def = document.createElement('option'); def.value=''; def.selected=true; def.disabled=true; def.style.cssText='color:#aaa;'; def.textContent='➕ Выберите доп работы'; sel.appendChild(def);
            avail.forEach(o=>{ let opt = document.createElement('option'); opt.value=o.name; opt.textContent=o.label; sel.appendChild(opt); });
            sel.addEventListener('change', function() {
                if (this.value) {
                    if (extraWorks.some(w=>w.name===this.value)) { alert('⚠️ Уже добавлена'); this.value=''; return; }
                    let opt = EXTRA_WORK_OPTIONS.find(o=>o.name===this.value);
                    extraWorks.push({ name:this.value, label:opt?opt.label:this.value, qty:'', rooms:'' }); this.value=''; renderExtraWorkBlock();
                }
            });
            sg.appendChild(sel); selRow.appendChild(sg);
            ['col-qty','col-rooms','col-actions'].forEach(cls=>{ let grp = document.createElement('div'); grp.className='form-group '+cls; let lbl = document.createElement('label'); lbl.innerHTML='&nbsp;'; grp.appendChild(lbl); let d = document.createElement('div'); d.className='h-34'; grp.appendChild(d); selRow.appendChild(grp); });
            block.appendChild(selRow); container.appendChild(block);
        }

        function savePresetValues() {
            let cq = document.querySelector('.preset-cable-qty'); if(cq) savedPresetValues.cableQty = cq.value;
            let cs = document.querySelector('.preset-cable-channel'); if(cs) savedPresetValues.cableChannel = cs.value;
            let chq = document.querySelector('.preset-channel-qty'); if(chq) savedPresetValues.cableChannelQty = chq.value;
            let crs = document.querySelector('.preset-corrugation'); if(crs) savedPresetValues.corrugation = crs.value;
            let crq = document.querySelector('.preset-corrugation-qty'); if(crq) savedPresetValues.corrugationQty = crq.value;
        }

        function handleAddToJournal() {
            let date = dateInput.value, fio = fioInput.value.trim()||'Не указано', floor = floorSelect.value, room = roomInput.value.trim(), workType = workTypeSelect.value, system = systemSelect.value;
            if (!date) { alert('Дата'); return; } if (!room) { alert('Помещение'); return; } if (isNaN(parseInt(room)) || parseInt(room)<=0) { alert('Некорректный номер'); return; }
            let preview = [];
            let cq = parseQty(document.querySelector('.preset-cable-qty')?.value||''), cn = document.querySelector('.preset-cable')?.value||'';
            if (cn && cq>0) preview.push({ material: cn, unit:'м', qty:cq, room });
            let chq = parseQty(document.querySelector('.preset-channel-qty')?.value||''), chn = document.querySelector('.preset-cable-channel')?.value||'';
            if (chn && chq>0) preview.push({ material: chn, unit:'м', qty:chq, room });
            let crq = parseQty(document.querySelector('.preset-corrugation-qty')?.value||''), crn = document.querySelector('.preset-corrugation')?.value||'';
            if (crn && crq>0) preview.push({ material: crn, unit:'м', qty:crq, room });
            document.querySelectorAll('.preset-extra-select').forEach((sel, idx)=>{
                if(idx<extraMaterials.length){ let q=parseQty(document.querySelectorAll('.preset-extra-qty')[idx]?.value||''); if(sel.value && q>0){ let unit=PRESET_MATERIALS[system]?.extra.find(e=>e.name===sel.value)?.unit||'м'; preview.push({material:sel.value, unit, qty:q, room}); } }
            });
            for (let w of extraWorks) { let q=parseQty(w.qty||''), rooms=normalizeRoomsList(w.rooms||''); if(w.name && q>0 && rooms) preview.push({material:w.name, unit:'шт', qty:q, room:rooms}); }
            if (!preview.length) { alert('Нет материалов'); return; }
            showConfirmModal({ date, fio, floor, room, workType, system, materials: preview });
        }

        addToJournalBtn.addEventListener('click', handleAddToJournal);
        clearBtn.addEventListener('click', clearAll);
        sendBtn.addEventListener('click', sendReport);
        csvBtn.addEventListener('click', exportCSV);

        systemSelect.addEventListener('change', function(){ extraMaterials=[]; extraWorks=[]; savedPresetValues={cableQty:'',cableChannel:'',cableChannelQty:'',corrugation:'',corrugationQty:''}; renderPresetBlock(); renderExtraWorkBlock(); });

        renderPresetBlock(); renderExtraWorkBlock(); render();
        console.log('✅ Загружено');
    </script>
</body>
</html>
